[pytest]
testpaths = tests/runs/2026-05-04_comprehensive-validation/suite
markers =
    slow: Full precision sweep (n_bits=5000, 5 trials). Run with: pytest -m slow
    fast: Quick sanity checks (n_bits=1000, 3 trials). Run with: pytest -m fast
    sync: Frontend/backend API sync tests. Requires backend running. Run with: pytest -m sync
asyncio_mode = strict
